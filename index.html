<!doctype html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Rutes GPX</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#232220" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Rutes" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        background: rgb(245, 245, 245);
        font-family: "Poppins", sans-serif;
      }
      ::-webkit-scrollbar {
        display: none;
      }
      #searchInput::placeholder {
        color: var(--ph-color);
        opacity: 1;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      #glassBackdrop {
        position: fixed;
        inset: 0;
        z-index: -1;
        background: var(--backdrop-gradient);
      }
      #app {
        width: 100%;
        position: relative;
        z-index: 1;
      }
      .screen {
        min-height: 100dvh;
        position: relative;
      }
      /* Vidrio: piel decorativa reutilizable sobre cualquier panel — solo se
         aplica cuando la piel activa define skin.glass = true (ver SKINS). */
      .glass {
        backdrop-filter: blur(16px) saturate(180%);
        -webkit-backdrop-filter: blur(16px) saturate(180%);
      }
      @media (prefers-reduced-transparency: reduce) {
        .glass {
          backdrop-filter: none !important;
          -webkit-backdrop-filter: none !important;
          background-color: var(--panel-solid) !important;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        * {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
        }
      }
      /* Arcilla: relieve suave con --clay-shadow-* puestas por JS (ver
         clayShadow() en el script) — solo se usa cuando skin.clay = true. */
      .clay-tile {
        box-shadow: var(--clay-shadow);
      }
      .clay-interactive {
        box-shadow: var(--clay-shadow);
        transition: box-shadow 0.15s;
      }
      .clay-interactive:hover {
        box-shadow: var(--clay-shadow-hover);
      }
      .clay-interactive:active {
        box-shadow: var(--clay-shadow-pressed);
      }
      .clay-inset {
        box-shadow: var(--clay-shadow-inset);
      }
      @keyframes revealInset {
        to {
          clip-path: inset(0 0 0 0);
        }
      }
      .chart-reveal {
        clip-path: inset(0 100% 0 0);
        animation: revealInset 1.1s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
      @media (max-width: 480px) {
        .bento-split > * {
          flex-basis: 100% !important;
          min-width: 0 !important;
        }
      }
      a:focus-visible,
      button:focus-visible,
      input:focus-visible,
      select:focus-visible,
      [tabindex]:focus-visible {
        outline: 3px solid #fbbf24;
        outline-offset: 2px;
        border-radius: 6px;
      }
      .container-narrow {
        width: 100%;
      }
      .container-wide {
        max-width: 1100px;
        margin: 0 auto;
      }
      .cards-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 18px;
      }
      @media (min-width: 760px) {
        .cards-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (min-width: 1040px) {
        .cards-grid {
          grid-template-columns: repeat(3, 1fr);
        }
      }
      .stats-hero {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }
      @media (min-width: 560px) {
        .stats-hero {
          grid-template-columns: repeat(4, 1fr);
        }
      }
      .sponsors-grid {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px 16px;
      }
      .sponsors-grid > * {
        flex: 0 0 calc(50% - 8px);
      }
      @media (min-width: 560px) {
        .sponsors-grid > * {
          flex: 0 0 calc(25% - 12px);
        }
      }
      .back-btn {
        width: 40px;
        border-radius: 50%;
        padding: 0;
      }
      .back-label {
        display: none;
      }
      .filter-toggle-desktop {
        display: none;
      }
      .filter-fab {
        position: absolute;
        left: 50%;
        bottom: calc(20px + env(safe-area-inset-bottom));
        transform: translateX(-50%);
        z-index: 20;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 13px 20px;
        border-radius: 999px;
        border: none;
        cursor: pointer;
        font-family: "Space Grotesk", sans-serif;
        font-size: 14px;
        font-weight: 600;
        background: var(--fab-bg);
        color: var(--fab-fg);
        border: var(--fab-border, none);
        box-shadow: var(
          --fab-shadow,
          0 12px 28px rgba(0, 0, 0, 0.28),
          0 2px 8px rgba(0, 0, 0, 0.2)
        );
      }
      .filter-fab .badge {
        min-width: 18px;
        height: 18px;
        padding: 0 4px;
        border-radius: 999px;
        font-size: 11px;
        font-family: ui-monospace, monospace;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--fab-badge-bg);
        color: var(--fab-badge-fg);
      }
      @media (min-width: 560px) {
        .back-btn {
          width: auto;
          border-radius: 20px;
          padding: 0 16px 0 12px;
          gap: 6px;
        }
        .back-label {
          display: inline;
        }
        .filter-toggle-desktop {
          display: block;
        }
        .filter-fab {
          display: none;
        }
      }
      @media (min-width: 560px) {
        body {
          padding: 32px 16px;
          display: flex;
          justify-content: center;
        }
        #app {
          max-width: 1100px;
        }
        .screen {
          min-height: calc(100dvh - 64px);
          border-radius: 32px;
          box-shadow: var(--screen-shadow, 0 30px 60px -20px rgba(0, 0, 0, 0.15));
          border: var(--screen-border, 1px solid rgb(229, 229, 229));
          overflow: hidden;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script>
      let trackTypes = ["MTB", "ROAD", "GRAVEL", "TRAIL", "BIKEPACKING"];

      function hexToRgbArr(hex) {
        const h = hex.replace("#", "");
        return [
          parseInt(h.substring(0, 2), 16),
          parseInt(h.substring(2, 4), 16),
          parseInt(h.substring(4, 6), 16),
        ];
      }
      function rgbStr(c, alpha) {
        return alpha === undefined
          ? `rgb(${c[0]},${c[1]},${c[2]})`
          : `rgba(${c[0]},${c[1]},${c[2]},${alpha})`;
      }
      // Varios controles son <div>/<a> con clic, no <button> nativos —
      // Enter/Espacio no los activa solos, así que lo cableamos aquí. Válido
      // para cualquier piel, no es una particularidad visual.
      function bindActivate(el, fn) {
        if (!el) return;
        el.addEventListener("click", fn);
        el.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            fn(e);
          }
        });
      }

      // Piel activa: separa "aspecto" (radios, grosor de borde, paleta de
      // insignias por tipo, si los títulos van en mayúsculas, si el CTA/screen
      // lleva contorno, si el badge del FAB usa el color de acento) de la
      // lógica de siempre (parseGpx, estado, render). Cambiar de piel es
      // cambiar qué entrada de este objeto está activa — no hay ningún dato
      // ni cálculo distinto entre pieles, solo estos valores.
      const SKINS = {
        default: {
          themeFile: "rutas/theme.json",
          cardRadius: "20px",
          statRadius: "16px",
          badgeRadius: "20px",
          borderWidth: "1px",
          typeAccentColors: [
            "#0891b2", // cyan (no el mismo azul que primary/buttonBg)
            "#7c3aed", // violet
            "#0f766e", // teal
            "#c2410c", // orange
            "#047857", // emerald
            "#4f46e5", // indigo
            "#c026d3", // fuchsia
            "#0369a1", // sky
            "#e11d48", // rose
            "#4d7c0f", // lime
            "#78350f", // brown
            "#475569", // slate
          ],
          typeAccentFg: "#ffffff",
          headingUppercase: false,
          ctaBorder: false,
          fabBadgeUsesAccent: false,
          heroUsesAccent: true,
          glass: false,
          fabGlass: false,
          homeLayout: "stacked",
          cardColorMode: "badge",
          clay: false,
          chartReveal: false,
          statTileRoles: false,
          detailChartBg: "hero",
        },
        yellowbird: {
          themeFile: "rutas/theme-yellowbird.json",
          cardRadius: "14px",
          statRadius: "12px",
          badgeRadius: "8px",
          borderWidth: "2px",
          // Paleta plana y clara — todas llevan texto negro (typeAccentFg),
          // el blanco no llega a 4.5:1 en ninguna de ellas. Sin el amarillo
          // de accent (#FFD23F): el mini-mapa (heroBg) ya es ese mismo
          // amarillo, y una insignia del mismo color se volvía invisible
          // encima — el "se solapan" que reportaste.
          typeAccentColors: [
            "#06B6D4",
            "#5AC8FA",
            "#FF9F1C",
            "#7ED957",
            "#FF6B9D",
            "#B892FF",
            "#4CD4B0",
            "#FFB4A2",
            "#C9A24B",
          ],
          typeAccentFg: "#171717",
          headingUppercase: true,
          ctaBorder: true,
          fabBadgeUsesAccent: true,
          heroUsesAccent: true,
          glass: false,
          fabGlass: false,
          homeLayout: "stacked",
          cardColorMode: "badge",
          clay: false,
          chartReveal: false,
          statTileRoles: false,
          detailChartBg: "hero",
        },
        glassmorphism: {
          themeFile: "rutas/theme-glassmorphism.json",
          cardRadius: "20px",
          statRadius: "16px",
          badgeRadius: "20px",
          borderWidth: "1px",
          // Tonos joya — ninguno coincide con primary/accent (para no
          // confundirse con botones/insignias de dificultad). El texto de
          // cada insignia se decide en caliente según el color de fondo
          // (ver typeAccentFgFor) porque algunos de estos tonos son
          // demasiado oscuros para texto negro.
          typeAccentColors: [
            "#0D9488",
            "#FB7185",
            "#38BDF8",
            "#65A30D",
            "#34D399",
            "#F472B6",
            "#22D3EE",
            "#A78BFA",
            "#FB923C",
          ],
          typeAccentFg: "#14142B",
          headingUppercase: false,
          ctaBorder: true,
          fabBadgeUsesAccent: false,
          // El banner no es un bloque de acento sólido, es cristal neutro
          // (glassAlpha.hero) igual que las tarjetas, solo que más fino.
          heroUsesAccent: false,
          glass: true,
          fabGlass: true,
          // Alphas del cristal — verificados a mano contra el peor caso (panel
          // encima del tramo más saturado del fondo) para que el texto
          // (siempre textPrimary/textSecondary) mantenga ≥4.5:1.
          glassAlpha: { screen: 0.5, card: 0.62, hero: 0.55, border: 0.3 },
          backdropGradient: {
            light:
              "radial-gradient(at 15% 20%, #FB7185 0%, transparent 55%)," +
              "radial-gradient(at 85% 15%, #8B5CF6 0%, transparent 55%)," +
              "radial-gradient(at 90% 90%, #38BDF8 0%, transparent 55%)," +
              "radial-gradient(at 10% 90%, #FBBF24 0%, transparent 55%)," +
              "linear-gradient(#F5F3FF, #F5F3FF)",
            dark:
              "radial-gradient(at 15% 20%, #9D174D 0%, transparent 55%)," +
              "radial-gradient(at 85% 15%, #4338CA 0%, transparent 55%)," +
              "radial-gradient(at 90% 90%, #0E7490 0%, transparent 55%)," +
              "radial-gradient(at 10% 90%, #A21CAF 0%, transparent 55%)," +
              "linear-gradient(#0F0B1E, #0F0B1E)",
          },
          homeLayout: "stacked",
          cardColorMode: "badge",
          clay: false,
          chartReveal: false,
          statTileRoles: false,
          detailChartBg: "hero",
        },
        claybento: {
          themeFile: "rutas/theme-claybento.json",
          cardRadius: "14px",
          statRadius: "14px",
          badgeRadius: "999px",
          borderWidth: "0",
          // Misma paleta que yellowbird — ya verificada: las 9 pasan ≥4.5:1
          // con texto casi negro, y aquí ese texto cubre la tarjeta entera,
          // no solo una insignia.
          typeAccentColors: [
            "#06B6D4",
            "#5AC8FA",
            "#FF9F1C",
            "#7ED957",
            "#FF6B9D",
            "#B892FF",
            "#4CD4B0",
            "#FFB4A2",
            "#C9A24B",
          ],
          typeAccentFg: "#171717",
          headingUppercase: false,
          ctaBorder: false,
          fabBadgeUsesAccent: false,
          heroUsesAccent: true,
          glass: false,
          fabGlass: false,
          // "bento": el inicio es un mosaico de bloques de color en vez de
          // una columna apilada; "full": la tarjeta de ruta entera es del
          // color del tipo, no solo una insignia pequeña.
          homeLayout: "bento",
          cardColorMode: "full",
          clay: true,
          chartReveal: true,
          // Navy fijo para el trazado del mini-mapa y la caja "Segueix-nos"
          // del inicio — no cambia entre claro/oscuro ni depende de primary,
          // así se ve igual de nítido sobre cualquiera de las 9 del tipo.
          navyColor: "#0B2A4A",
          // El detalle también es bento: el gráfico va en blanco (no en el
          // amarillo de acento), y las 4 tarjetas de estadística llevan un
          // color fijo cada una (azul/amarillo/tostado/rojo) en vez de ser
          // todas iguales salvo la de dificultad.
          statTileRoles: true,
          detailChartBg: "card",
        },
      };
      let activeSkin = SKINS.default;

      function typeAccentBg(type) {
        let hash = 0;
        for (let i = 0; i < type.length; i++) {
          hash = (hash * 53 + type.charCodeAt(i)) >>> 0;
        }
        const colors = activeSkin.typeAccentColors;
        return colors[hash % colors.length];
      }
      // Luminancia relativa (WCAG) de un color hex — para decidir el texto
      // de cada insignia de tipo según SU PROPIO fondo, no un valor fijo por
      // piel: una paleta de 9-12 colores casi siempre tiene algún tono a
      // medio camino que ni el negro de la piel ni el blanco leen bien con
      // el otro fijo.
      function relLuminance(hex) {
        const [r, g, b] = hexToRgbArr(hex).map((c) => {
          c /= 255;
          return c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
        });
        return 0.2126 * r + 0.7152 * g + 0.0722 * b;
      }
      function contrastRatio(l1, l2) {
        const lighter = Math.max(l1, l2);
        const darker = Math.min(l1, l2);
        return (lighter + 0.05) / (darker + 0.05);
      }
      function typeAccentFgFor(bgHex) {
        const bgL = relLuminance(bgHex);
        const preferred = activeSkin.typeAccentFg;
        const preferredL = relLuminance(preferred);
        // La alternativa es el extremo opuesto al que prefiere la piel — si
        // la piel prefiere texto oscuro, la alternativa es blanco, y
        // viceversa (caso de "default", que prefiere blanco).
        const altColor = preferredL > 0.5 ? "#171717" : "#ffffff";
        const altL = relLuminance(altColor);
        return contrastRatio(bgL, altL) > contrastRatio(bgL, preferredL)
          ? altColor
          : preferred;
      }

      // Base palette. Contrast-checked against WCAG AA (4.5:1 for normal text);
      // light destructive and dark primary are darkened one step from the source
      // palette (red-600→red-700, blue-500→blue-600) — the raw values were too
      // light to pass as text against their paired (white) foreground.
      const defaultThemeConfig = {
        light: {
          background: [255, 255, 255],
          foreground: [15, 23, 42],
          card: [255, 255, 255],
          primary: [37, 99, 235],
          primaryForeground: [255, 255, 255],
          muted: [241, 245, 249],
          mutedForeground: [100, 116, 139],
          accent: [254, 249, 195],
          accentForeground: [133, 77, 14],
          destructive: [220, 38, 38],
          destructiveForeground: [255, 255, 255],
          border: [226, 232, 240],
        },
        dark: {
          background: [15, 23, 42],
          foreground: [248, 250, 252],
          card: [30, 41, 59],
          primary: [37, 99, 235],
          primaryForeground: [255, 255, 255],
          muted: [30, 41, 59],
          mutedForeground: [148, 163, 184],
          accent: [30, 58, 138],
          accentForeground: [253, 230, 138],
          destructive: [127, 29, 29],
          destructiveForeground: [248, 250, 252],
          border: [51, 65, 85],
        },
      };

      let palette = {
        light: { ...defaultThemeConfig.light },
        dark: { ...defaultThemeConfig.dark },
      };

      function rebuildThemeObjects() {
        diffColorsByTheme = {
          light: {
            facil: {
              bg: rgbStr(palette.light.muted),
              fg: rgbStr(palette.light.foreground),
            },
            dificil: {
              bg: rgbStr(palette.light.accent),
              fg: rgbStr(palette.light.accentForeground),
            },
            moltDificil: {
              bg: rgbStr(palette.light.destructive),
              fg: rgbStr(palette.light.destructiveForeground),
            },
          },
          dark: {
            facil: {
              bg: rgbStr(palette.dark.muted),
              fg: rgbStr(palette.dark.mutedForeground),
            },
            dificil: {
              bg: rgbStr(palette.dark.accent),
              fg: rgbStr(palette.dark.accentForeground),
            },
            moltDificil: {
              bg: rgbStr(palette.dark.destructive),
              fg: rgbStr(palette.dark.destructiveForeground),
            },
          },
        };
        // ga (glassAlpha) y heroUsesAccent solo existen/cambian en pieles de
        // cristal — el resto de pieles siguen exactamente la fórmula de
        // siempre (ga undefined → sin alpha; heroUsesAccent true por
        // defecto → heroBg es el bloque de acento sólido).
        const ga = activeSkin.glassAlpha;
        const heroUsesAccent = activeSkin.heroUsesAccent !== false;
        themes = {
          light: {
            screenBg: ga
              ? rgbStr(palette.light.background, ga.screen)
              : rgbStr(palette.light.background),
            cardBg: ga
              ? rgbStr(palette.light.card, ga.card)
              : rgbStr(palette.light.card),
            panelSolid: rgbStr(palette.light.card),
            border: ga
              ? rgbStr(palette.light.border, ga.border)
              : rgbStr(palette.light.border),
            textPrimary: rgbStr(palette.light.foreground),
            textSecondary: rgbStr(palette.light.mutedForeground),
            textTertiary: rgbStr([110, 110, 110]),
            heroBg: heroUsesAccent
              ? rgbStr(palette.light.accent)
              : rgbStr(palette.light.card, ga && ga.hero),
            sponsorBg: rgbStr(palette.light.muted),
            chipBg: rgbStr(palette.light.muted),
            chipBgActive: rgbStr(palette.light.primary),
            chipFgActive: rgbStr(palette.light.primaryForeground),
            buttonBg: rgbStr(palette.light.primary),
            buttonFg: rgbStr(palette.light.primaryForeground),
            destructiveBg: rgbStr(palette.light.destructive),
            destructiveFg: rgbStr(palette.light.destructiveForeground),
            accentBg: rgbStr(palette.light.accent),
            accentFg: rgbStr(palette.light.accentForeground),
            areaFill: rgbStr(palette.light.primary, 0.65),
            // lineStroke/linkColor son opcionales en theme.json: si no se
            // definen, se derivan como siempre (primary / accentForeground).
            // Algunas pieles necesitan un valor propio — p.ej. glass, porque
            // un tono intermedio no aguanta el rango de luminosidad que puede
            // asomar detrás del cristal; yellowbird, porque su
            // accentForeground es oscuro (texto de insignia), no serviría
            // como color de enlace legible.
            lineStroke: rgbStr(palette.light.lineStroke || palette.light.primary),
            linkColor: rgbStr(palette.light.linkColor || palette.light.accentForeground),
            chromeBg: rgbStr(palette.light.foreground, 0.02),
            shadowCard: activeSkin.glass
              ? "0 8px 32px rgba(31,38,135,0.18)"
              : "0 4px 12px rgba(0,0,0,0.08), 0 1px 2px rgba(0,0,0,0.08)",
          },
          dark: {
            screenBg: ga
              ? rgbStr(palette.dark.background, ga.screen)
              : rgbStr(palette.dark.background),
            cardBg: ga
              ? rgbStr(palette.dark.card, ga.card)
              : rgbStr(palette.dark.card),
            panelSolid: rgbStr(palette.dark.card),
            border: ga
              ? rgbStr(palette.dark.border, ga.border)
              : rgbStr(palette.dark.border),
            textPrimary: rgbStr(palette.dark.foreground),
            textSecondary: rgbStr(palette.dark.mutedForeground),
            textTertiary: rgbStr(palette.dark.mutedForeground),
            heroBg: heroUsesAccent
              ? rgbStr(palette.dark.accent)
              : rgbStr(palette.dark.card, ga && ga.hero),
            sponsorBg: rgbStr(palette.dark.muted),
            chipBg: rgbStr(palette.dark.muted),
            chipBgActive: rgbStr(palette.dark.primary),
            chipFgActive: rgbStr(palette.dark.primaryForeground),
            buttonBg: rgbStr(palette.dark.primary),
            buttonFg: rgbStr(palette.dark.primaryForeground),
            destructiveBg: rgbStr(palette.dark.destructive),
            destructiveFg: rgbStr(palette.dark.destructiveForeground),
            accentBg: rgbStr(palette.dark.accent),
            accentFg: rgbStr(palette.dark.accentForeground),
            areaFill: rgbStr(palette.dark.primary, 0.3),
            lineStroke: palette.dark.lineStroke
              ? rgbStr(palette.dark.lineStroke)
              : rgbStr([96, 165, 250]),
            linkColor: rgbStr(palette.dark.linkColor || palette.dark.accentForeground),
            chromeBg: rgbStr(palette.dark.foreground, 0.035),
            shadowCard: activeSkin.glass
              ? "0 8px 32px rgba(0,0,0,0.45)"
              : "0 10px 20px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.4)",
          },
        };
      }

      let distanceBuckets = [

      ];
      let elevationBuckets = [
        { key: "ALL", label: "Tots" },
        { key: "lt200", label: "< 200 m", max: 200 },
        { key: "200-500", label: "200-500 m", min: 200, max: 500 },
        { key: "gt500", label: "> 500 m", min: 500 },
      ];
      function bucketMatches(bucket, value) {
        if (bucket.min !== undefined && value < bucket.min) return false;
        if (bucket.max !== undefined && value > bucket.max) return false;
        return true;
      }
      function applyFiltersConfig(filters) {
        if (!filters) return;
        if (filters.trackTypes) trackTypes = filters.trackTypes;
        if (filters.difficultyLabels)
          difficultyLabels = {
            ...difficultyLabels,
            ...filters.difficultyLabels,

      function haversineKm(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = ((lat2 - lat1) * Math.PI) / 180;
        const dLon = ((lon2 - lon1) * Math.PI) / 180;
        const a =
          Math.sin(dLat / 2) ** 2 +
          Math.cos((lat1 * Math.PI) / 180) *
            Math.cos((lat2 * Math.PI) / 180) *
            Math.sin(dLon / 2) ** 2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      }

      function parseGpx(xmlText, id, trackType) {
        const doc = new DOMParser().parseFromString(xmlText, "text/xml");
        let pointEls = Array.from(doc.getElementsByTagName("trkpt"));
        let container = doc.getElementsByTagName("trk")[0];
        if (!pointEls.length) {
          pointEls = Array.from(doc.getElementsByTagName("rtept"));
          container = doc.getElementsByTagName("rte")[0];
        }
        if (!pointEls.length) {
          pointEls = Array.from(doc.getElementsByTagName("wpt"));
          container = null;
        }
        if (!pointEls.length) return null;

        const points = pointEls.map((pt) => ({
          lat: parseFloat(pt.getAttribute("lat")),
          lon: parseFloat(pt.getAttribute("lon")),
          ele: parseFloat(
            (pt.getElementsByTagName("ele")[0] &&
              pt.getElementsByTagName("ele")[0].textContent) ||
              "0",
          ),
        }));

        let distanceKm = 0,
          elevGain = 0,
          elevLoss = 0;
        for (let i = 1; i < points.length; i++) {
          distanceKm += haversineKm(
            points[i - 1].lat,
            points[i - 1].lon,
            points[i].lat,
            points[i].lon,
          );
          const diff = points[i].ele - points[i - 1].ele;
          if (diff > 0) elevGain += diff;
          else elevLoss += -diff;
        }
        elevGain = Math.round(elevGain);
        elevLoss = Math.round(elevLoss);
        distanceKm = Math.round(distanceKm * 10) / 10;
        const maxAlt = Math.round(Math.max(...points.map((p) => p.ele)));
        const minAlt = Math.round(Math.min(...points.map((p) => p.ele)));

        const gainPerKm = elevGain / (distanceKm || 1);
        const diffKey =
          gainPerKm > 20 ? "moltDificil" : gainPerKm > 10 ? "dificil" : "facil";

        const speed = 22 - Math.min(gainPerKm * 0.5, 10);
        const hoursFloat = distanceKm / Math.max(speed, 8);
        const hours = Math.floor(hoursFloat);
        const minutes = Math.round((hoursFloat - hours) * 60);
        const duration = hours > 0 ? `${hours}h ${minutes}m` : `${minutes}m`;

        const nameEl =
          (container && container.getElementsByTagName("name")[0]) ||
          doc.getElementsByTagName("name")[0];
        const rawName = (nameEl ? nameEl.textContent : "Ruta sense nom").trim();
        const parts = rawName.includes(",")
          ? rawName.split(/,\s*/, 2)
          : [rawName, ""];

        const closeKm = haversineKm(
          points[0].lat,
          points[0].lon,
          points[points.length - 1].lat,
          points[points.length - 1].lon,
        );
        const routeShape =
          closeKm < Math.max(distanceKm * 0.05, 0.3) ? "Circular" : "Lineal";
        const trailRank = Math.max(
          1,
          Math.min(99, Math.round(distanceKm * 0.9 + elevGain * 0.045)),
        );

        const lats = points.map((p) => p.lat),
          lons = points.map((p) => p.lon);
        const centerLat = ((Math.min(...lats) + Math.max(...lats)) / 2).toFixed(
          5,
        );
        const centerLon = ((Math.min(...lons) + Math.max(...lons)) / 2).toFixed(
          5,
        );
        let sourceUrl = null;
        const metadataEl = doc.getElementsByTagName("metadata")[0];
        if (metadataEl) {
          const directLink = Array.from(metadataEl.children).find(
            (el) => el.tagName.toLowerCase() === "link",
          );
          if (directLink) sourceUrl = directLink.getAttribute("href");
        }
        const externalUrl =
          sourceUrl ||
          `https://www.openstreetmap.org/#map=12/${centerLat}/${centerLon}`;

        return {
          id,
          name: parts[0],
          location: parts[1],
          distanceKm,
          elevGain,
          elevLoss,
          duration,
          maxAlt,
          minAlt,
          diffKey,
          trailRank,
          routeShape,
          trackType,
          externalUrl,
          profile: points.map((p) => Math.round(p.ele)),
          shapePoints: routeShapeSvg(points),
        };
      }

      function routeShapeSvg(points) {
        const lats = points.map((p) => p.lat);
        const lons = points.map((p) => p.lon);
        const minLat = Math.min(...lats),
          maxLat = Math.max(...lats);
        const minLon = Math.min(...lons),
          maxLon = Math.max(...lons);
        const latRange = maxLat - minLat || 1,
          lonRange = maxLon - minLon || 1;
        const w = 300,
          h = 130,
          pad = 14;
        return points
          .map((p) => {
            const x = pad + ((p.lon - minLon) / lonRange) * (w - 2 * pad);
            const y = pad + (1 - (p.lat - minLat) / latRange) * (h - 2 * pad);
            return x.toFixed(1) + "," + y.toFixed(1);
          })
          .join(" ");
      }

      function smoothLinePath(pts) {
        if (pts.length < 3) {
          return (
            "M " +
            pts.map((p) => p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" L ")
          );
        }
        let d = "M " + pts[0][0].toFixed(1) + " " + pts[0][1].toFixed(1) + " ";
        for (let i = 0; i < pts.length - 1; i++) {
          const p0 = pts[i - 1] || pts[i];
          const p1 = pts[i];
          const p2 = pts[i + 1];
          const p3 = pts[i + 2] || p2;
          const c1x = p1[0] + (p2[0] - p0[0]) / 6;
          const c1y = p1[1] + (p2[1] - p0[1]) / 6;
          const c2x = p2[0] - (p3[0] - p1[0]) / 6;
          const c2y = p2[1] - (p3[1] - p1[1]) / 6;
          d += `C ${c1x.toFixed(1)} ${c1y.toFixed(1)} ${c2x.toFixed(1)} ${c2y.toFixed(1)} ${p2[0].toFixed(1)} ${p2[1].toFixed(1)} `;
        }
        return d;
      }
      function chartData(profile) {
        const min = Math.min(...profile);
        const max = Math.max(...profile);
        const w = 300,
          h = 130,
          topPad = 40,
          bottomPad = 10;
        const n = profile.length;
        const pts = profile.map((v, i) => {
          const x = (i / (n - 1)) * w;
          const y =
            h -
            bottomPad -
            ((v - min) / (max - min || 1)) * (h - topPad - bottomPad);
          return [x, y];
        });
        const linePath = smoothLinePath(pts);
        const areaPath =
          linePath +
          `L ${pts[pts.length - 1][0].toFixed(1)} ${h} L ${pts[0][0].toFixed(1)} ${h} Z`;
        return { linePath, areaPath, min, max };
      }

      async function loadConfig() {
        try {
          const res = await fetch("rutas/config.json");
          if (!res.ok) return null;
          return await res.json();
        } catch (e) {
          return null;
        }
      }

      async function loadTheme() {
        try {
          const res = await fetch(activeSkin.themeFile);
          if (!res.ok) return;
          const cfg = await res.json();
          applyThemeConfig(cfg);
        } catch (e) {
          /* keep defaults */
        }
      }

      async function loadRoutes() {
        state.config = await loadConfig();
        // ?skin=... en la URL manda sobre config.json, para poder previsualizar
        // una piel sin tocar el archivo compartido.
        const skinParam = new URLSearchParams(location.search).get("skin");
        const skinName =
          skinParam || (state.config && state.config.skin) || "default";
        activeSkin = SKINS[skinName] || SKINS.default;
        await loadTheme();
        if (state.config && state.config.filters)
          applyFiltersConfig(state.config.filters);
        try {
          const manifestRes = await fetch("rutas/manifest.json");
          if (!manifestRes.ok) throw new Error("no manifest");
          const entries = await manifestRes.json();
          if (!entries || !entries.length) {
            state.status = "empty";
            render();
            return;
          }
          const routes = [];
          const routeOverrides =
            (state.config && state.config.routeOverrides) || {};
          for (let i = 0; i < entries.length; i++) {
            const entry = entries[i];
            const filename = typeof entry === "string" ? entry : entry.file;
            const trackType =
              typeof entry === "string" ? "MTB" : entry.type || "MTB";
            const res = await fetch("rutas/" + filename);
            const text = await res.text();
            const route = parseGpx(text, i + 1, trackType);
            if (route) {
              const ov = routeOverrides[filename];
              if (ov) {
                if (ov.name) route.name = ov.name;
                if (ov.location) route.location = ov.location;
                if (ov.difficulty) route.diffKey = ov.difficulty;
                if (ov.duration) route.duration = ov.duration;
                if (ov.distanceKm != null) route.distanceKm = ov.distanceKm;
                if (ov.elevGain != null) route.elevGain = ov.elevGain;
                if (ov.elevLoss != null) route.elevLoss = ov.elevLoss;
                if (ov.maxAlt != null) route.maxAlt = ov.maxAlt;
                if (ov.minAlt != null) route.minAlt = ov.minAlt;
                if (ov.trailRank != null) route.trailRank = ov.trailRank;
                if (ov.routeShape) route.routeShape = ov.routeShape;
              }
              routes.push(route);
            }
          }
          if (!routes.length) {
            state.status = "empty";
            render();
            return;
          }
          const typesFound = [...new Set(routes.map((r) => r.trackType))];
          const preferredTypes =
            (state.config &&
              state.config.filters &&
              state.config.filters.trackTypes) ||
            [];
          trackTypes = [
            ...preferredTypes.filter((t) => typesFound.includes(t)),
            ...typesFound.filter((t) => !preferredTypes.includes(t)).sort(),
          ];
          state.routes = routes;
          state.status = "ready";
          state.selected = routes[0].id;
          applyStateFromHash();
          render();
        } catch (e) {
          state.status = "error";
          render();
        }
      }

      // "ALL" vacía la tipología entera (equivale a "Tots"); cualquier otra

      function toggleFacet(setName, key) {

      function decorate(route) {

      function headingSkinCss() {

          ? "text-transform:uppercase;letter-spacing:-0.02em;"

      function glassClass() {
        return activeSkin.glass ? " glass" : "";
      }
      // Sombra de "arcilla": relieve suave con un tinte cálido oscuro, tres
      // variantes (reposo/hover/pulsado) — solo se usa si skin.clay = true.
      function clayShadow(kind) {
        if (kind === "pressed")
          return "0 2px 5px rgba(40,26,10,0.05), inset 0 3px 6px rgba(0,0,0,0.06), inset 0 -1px 3px rgba(255,255,255,0.1)";
        if (kind === "hover")
          return "0 8px 16px rgba(40,26,10,0.07), inset 0 -2px 5px rgba(0,0,0,0.03), inset 0 2px 5px rgba(255,255,255,0.22)";
        if (kind === "inset")
          return "inset 0 1px 4px rgba(40,26,10,0.045), inset 0 -1px 2px rgba(255,255,255,0.2)";
        return "0 5px 12px rgba(40,26,10,0.05), inset 0 -2px 5px rgba(0,0,0,0.03), inset 0 2px 5px rgba(255,255,255,0.18)";
      }
      function clayClass(interactive) {
        return activeSkin.clay ? (interactive ? " clay-interactive" : " clay-tile") : "";
      }
      // El box-shadow en línea (theme.shadowCard) tapa siempre a la regla de
      // la clase .clay-tile/.clay-interactive por especificidad — con arcilla
      // activa hay que omitir el box-shadow en línea del todo (no vale
      // "none": también tapa) y dejar que la clase ponga la sombra real.
      function tileShadowCss(theme) {
        return activeSkin.clay ? "" : `box-shadow:${theme.shadowCard};`;
      }

      function render() {
        const app = document.getElementById("app");
        const theme = themes[state.themeName];
        const root = document.documentElement;

        if (activeSkin.backdropGradient) {
          let backdrop = document.getElementById("glassBackdrop");
          if (!backdrop) {
            backdrop = document.createElement("div");
            backdrop.id = "glassBackdrop";
            document.body.insertBefore(backdrop, app);
          }
          root.style.setProperty(
            "--backdrop-gradient",
            activeSkin.backdropGradient[state.themeName],
          );
          document.body.style.background = "transparent";
        } else {
          document.body.style.background =
            state.themeName === "dark" ? "rgb(10,10,10)" : "rgb(245,245,245)";
        }
        root.style.setProperty("--panel-solid", theme.panelSolid);

        if (activeSkin.ctaBorder) {
          root.style.setProperty(
            "--screen-border",
            `${activeSkin.borderWidth} solid ${theme.border}`,
          );
        } else {
          root.style.removeProperty("--screen-border");
        }
        if (activeSkin.glass) {
          root.style.setProperty("--screen-shadow", theme.shadowCard);
          root.style.setProperty(
            "--fab-border",
            `1px solid rgba(255,255,255,0.35)`,
          );
          root.style.setProperty("--fab-shadow", theme.shadowCard);
        } else {
          root.style.removeProperty("--screen-shadow");
          root.style.removeProperty("--fab-border");
          root.style.removeProperty("--fab-shadow");
        }
        if (activeSkin.clay) {
          root.style.setProperty("--clay-shadow", clayShadow());
          root.style.setProperty("--clay-shadow-hover", clayShadow("hover"));
          root.style.setProperty("--clay-shadow-pressed", clayShadow("pressed"));
          root.style.setProperty("--clay-shadow-inset", clayShadow("inset"));
        } else {
          root.style.removeProperty("--clay-shadow");
          root.style.removeProperty("--clay-shadow-hover");
          root.style.removeProperty("--clay-shadow-pressed");
          root.style.removeProperty("--clay-shadow-inset");
        }

        const searchWasFocused =
          document.activeElement && document.activeElement.id === "searchInput";
        const searchCaret = searchWasFocused
          ? document.activeElement.selectionStart
          : null;

          <div style="font-size:13px;font-weight:700;padding:6px 12px;border-radius:999px;background:rgba(0,0,0,0.1);">${r.distanceKm} km</div>
          <div style="font-size:13px;font-weight:700;padding:6px 12px;border-radius:999px;background:rgba(0,0,0,0.1);">+${r.elevGain} m</div>
          <div style="font-size:13px;font-weight:700;padding:6px 12px;border-radius:999px;background:rgba(0,0,0,0.1);">${r.duration}</div>
        </div>
      </div>`;
          };
          const badgeCardHtml = (r) => `
      <div class="card${glassClass()}${clayClass(true)}" tabindex="0" data-id="${r.id}" style="cursor:pointer;background:${theme.cardBg};border-radius:${activeSkin.cardRadius};overflow:hidden;border:${activeSkin.borderWidth} solid ${theme.border};${tileShadowCss(theme)}">
        <div style="height:130px;background:${theme.heroBg};display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;">
          <svg viewBox="0 0 300 130" style="width:100%;height:100%;display:block;">
            <polyline points="${r.shapePoints}" fill="none" stroke="${theme.lineStroke}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></polyline>
          </svg>
          <div style="position:absolute;top:10px;left:10px;font-size:10px;font-weight:700;letter-spacing:0.04em;padding:4px 9px;border-radius:${activeSkin.badgeRadius};background:${typeAccentBg(r.trackType)};color:${typeAccentFgFor(typeAccentBg(r.trackType))};">${r.trackType}</div>
        </div>
        <div style="padding:16px 18px 18px 18px;">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px;">
            <div style="font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:600;${headingSkinCss()}color:${theme.textPrimary};">${r.name}</div>
            <div style="flex-shrink:0;margin-top:2px;font-size:11px;font-weight:600;padding:4px 9px;border-radius:${activeSkin.badgeRadius};background:${r.difficultyBg};color:${r.difficultyFg};">${r.difficultyLabel}</div>
          </div>
          <div style="font-size:13px;color:${theme.textSecondary};margin-bottom:12px;">${r.location}</div>
          <div style="display:flex;gap:16px;">
            <div style="font-size:13px;color:${theme.textTertiary};"><b style="font-family:'Space Grotesk',sans-serif;color:${theme.textPrimary};">${r.distanceKm}</b> km</div>
            <div style="font-size:13px;color:${theme.textTertiary};"><b style="font-family:'Space Grotesk',sans-serif;color:${theme.textPrimary};">+${r.elevGain}</b> m</div>
            <div style="font-size:13px;color:${theme.textTertiary};"><b style="font-family:'Space Grotesk',sans-serif;color:${theme.textPrimary};">${r.duration}</b></div>
          </div>
        </div>
      </div>`;
          const cards = filtered
            .map((r) =>
              activeSkin.cardColorMode === "full"
                ? fullColorCardHtml(r)
                : badgeCardHtml(r),
            )
            .join("");

          const emptyFilterMsg =
            filtered.length === 0
              ? `<div style="text-align:center;padding:40px 0;font-size:13px;color:${theme.textSecondary};">Cap ruta amb aquests filtres.</div>`
              : "";

          const activeAdvancedCount =
            state.filterDifficulties.size +
            state.filterDistances.size +
            state.filterElevations.size;
          const moreFiltersHtml = state.moreFiltersOpen
            ? `
      <div id="moreFiltersPanel" class="${(glassClass()+clayClass()).trim()}" style="background:${theme.chipBg};border:${activeSkin.borderWidth} solid ${theme.border};border-radius:${activeSkin.statRadius};padding:16px;margin-bottom:16px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
          <div style="font-size:13px;font-weight:700;color:${theme.textPrimary};">Filtres avançats</div>
          <div id="clearMoreFiltersBtn" tabindex="0" role="button" style="cursor:pointer;font-size:12px;font-weight:600;color:${theme.linkColor};">Esborrar filtres</div>
        </div>
        <div style="font-size:11px;font-weight:600;color:${theme.textTertiary};text-transform:uppercase;letter-spacing:0.04em;margin-bottom:8px;">Dificultat</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;">${difficultyChips}</div>
        <div style="font-size:11px;font-weight:600;color:${theme.textTertiary};text-transform:uppercase;letter-spacing:0.04em;margin-bottom:8px;">Distància</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;">${distanceChips}</div>
        <div style="font-size:11px;font-weight:600;color:${theme.textTertiary};text-transform:uppercase;letter-spacing:0.04em;margin-bottom:8px;">Desnivell</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">${elevationChips}</div>
      </div>`
            : "";

          app.innerHTML = `<div class="screen${glassClass()}" style="background:${theme.screenBg}"><div style="position:absolute;inset:0;overflow-y:auto;padding:calc(28px + env(safe-area-inset-top)) 0 100px 0;">
      ${headerBarHtml("backHomeBtn", "Inici")}
      <div class="container-wide" style="padding:0 24px;">
        <div style="font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:700;${headingSkinCss()}color:${theme.textPrimary};margin-bottom:4px;">${siteTitle}</div>
        <div style="font-size:14px;color:${theme.textSecondary};margin:0 0 18px 0;">${decorated.length} ${decorated.length === 1 ? "ruta carregada" : "rutes carregades"}</div>
        <div style="margin-bottom:16px;">
          <input id="searchInput" class="${(glassClass()+(activeSkin.clay ? " clay-inset" : "")).trim()}" type="text" placeholder="Cerca per nom o ubicació…" value="${state.searchText.replace(/"/g, "&quot;")}" style="width:100%;box-sizing:border-box;padding:11px 14px;border-radius:12px;border:${activeSkin.borderWidth} solid ${theme.border};background:${theme.cardBg};color:${theme.textPrimary};font-size:14px;font-family:inherit;outline:none;--ph-color:${theme.textTertiary};" />
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;">${typeChips}</div>
        <div id="moreFiltersToggle" tabindex="0" role="button" class="filter-toggle-desktop" style="cursor:pointer;font-size:12px;font-weight:600;color:${theme.linkColor};margin-bottom:16px;">${state.moreFiltersOpen ? "Menys filtres ↑" : "Més filtres (dificultat, distància, desnivell) ↓"}</div>
        ${moreFiltersHtml}
        <div class="cards-grid">${cards}</div>
        ${emptyFilterMsg}
        ${sponsorsBoxHtml}
      </div>
      ${bottomBarHtml()}
    </div>
    <button id="filterFabBtn" class="filter-fab${glassClass()}" type="button" style="--fab-bg:${activeSkin.fabGlass ? theme.cardBg : theme.textPrimary};--fab-fg:${activeSkin.fabGlass ? theme.textPrimary : theme.screenBg};--fab-badge-bg:${activeSkin.fabBadgeUsesAccent ? theme.heroBg : theme.chipBgActive};--fab-badge-fg:${activeSkin.fabBadgeUsesAccent ? "#111111" : theme.chipFgActive};">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16M7 12h10M10 19h4"></path></svg>
      <span>Filtres</span>
      ${activeAdvancedCount > 0 ? `<span class="badge">${activeAdvancedCount}</span>` : ""}
      <span style="font-size:11px;">${state.moreFiltersOpen ? "↑" : "↓"}</span>
    </button>
  </div>`;

          bindActivate(document.getElementById("themeToggle"), toggleTheme);
          bindActivate(document.getElementById("backHomeBtn"), backToHome);
          bindActivate(
            document.getElementById("moreFiltersToggle"),
            toggleMoreFilters,
          );
          document
            .getElementById("filterFabBtn")
            .addEventListener("click", toggleMoreFilters);
          bindActivate(
            document.getElementById("clearMoreFiltersBtn"),
            clearMoreFilters,
          );
          const searchInput = document.getElementById("searchInput");
          searchInput.addEventListener("input", (e) =>
            setSearchText(e.target.value),
          );
          if (searchWasFocused) {
            searchInput.focus();
            searchInput.setSelectionRange(searchCaret, searchCaret);
          }
          app.querySelectorAll(".filterChip").forEach((el) =>
            bindActivate(el, () => {
              const group = el.getAttribute("data-group");
              const key = el.getAttribute("data-key");
              if (group === "type") toggleFacet("filterTypes", key);
              else if (group === "difficulty")
                toggleFacet("filterDifficulties", key);
              else if (group === "distance")
                toggleFacet("filterDistances", key);
              else if (group === "elevation")
                toggleFacet("filterElevations", key);
            }),
          );
          app
            .querySelectorAll(".card")
            .forEach((el) =>
              bindActivate(el, () =>
                openRoute(parseInt(el.getAttribute("data-id"), 10)),
              ),
            );
          return;
        }

        const r = decorated.find((x) => x.id === state.selected);
        const chart = chartData(r.profile);
        // statTileRoles: las 4 tarjetas llevan un color fijo cada una
        // (distancia/desnivell/durada/dificultat), no solo la de dificultat —
        // así lo pide el bento. El resto de pieles siguen como siempre:
        // las tres primeras neutras, solo la de dificultat coloreada según
        // el nivel real de la ruta.
        const distTile = activeSkin.statTileRoles
          ? { bg: theme.buttonBg, fg: theme.buttonFg }
          : { bg: theme.cardBg, fg: theme.textPrimary };
        const elevTile = activeSkin.statTileRoles
          ? { bg: theme.accentBg, fg: theme.accentFg }
          : { bg: theme.cardBg, fg: theme.lineStroke };
        const durTile = activeSkin.statTileRoles
          ? { bg: theme.sponsorBg, fg: theme.textPrimary }
          : { bg: theme.cardBg, fg: theme.textPrimary };
        const diffTile = activeSkin.statTileRoles
          ? { bg: theme.destructiveBg, fg: theme.destructiveFg }
          : { bg: r.difficultyBg, fg: r.difficultyFg };
        const statIcon = {
          distance:
            '<svg viewBox="0 0 24 24" width="14" height="14"><circle cx="5" cy="19" r="2.3" fill="currentColor"></circle><circle cx="19" cy="5" r="2.3" fill="currentColor"></circle><line x1="7" y1="17" x2="17" y2="7" stroke="currentColor" stroke-width="2"></line></svg>',
          elevation:
            '<svg viewBox="0 0 24 24" width="14" height="14"><path d="M3 19 L10 7 L14 13 L17 9 L21 19 Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"></path></svg>',
          duration:
            '<svg viewBox="0 0 24 24" width="14" height="14"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"></circle><line x1="12" y1="12" x2="12" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round"></line><line x1="12" y1="12" x2="16" y2="14" stroke="currentColor" stroke-width="2" stroke-linecap="round"></line></svg>',
          difficulty:
            '<svg viewBox="0 0 24 24" width="14" height="14"><line x1="5" y1="3" x2="5" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"></line><path d="M5 4 L18 4 L14 8 L18 12 L5 12 Z" fill="currentColor"></path></svg>',
        };
        const statLabelHtml = (icon, label, fg) =>
          activeSkin.statTileRoles
            ? `<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;color:${fg};opacity:0.85;">${statIcon[icon]}<span style="font-size:11px;">${label}</span></div>`
            : `<div style="font-size:12px;color:${theme.textSecondary};margin-bottom:6px;">${label}</div>`;
        app.innerHTML = `<div class="screen${glassClass()}" style="background:${theme.screenBg}"><div style="position:absolute;inset:0;overflow-y:auto;padding:calc(28px + env(safe-area-inset-top)) 0 32px 0;">
    ${headerBarHtml("backBtn", "Rutes")}
    <div class="container-narrow" style="padding:0 24px 20px 24px;">
      <div style="font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;${headingSkinCss()}color:${theme.textPrimary};margin-bottom:2px;">${r.name}</div>
      <div style="font-size:14px;color:${theme.textSecondary};">${r.location}</div>
    </div>
    <div class="container-narrow" style="padding:0 24px 20px 24px;">
      <div class="${(glassClass()+clayClass()).trim()}" style="height:220px;position:relative;background:${activeSkin.detailChartBg === "card" ? theme.cardBg : theme.heroBg};border-radius:${activeSkin.cardRadius};overflow:hidden;border:${activeSkin.borderWidth} solid ${theme.border};${tileShadowCss(theme)}">
        <svg viewBox="0 0 300 130" preserveAspectRatio="none" class="${activeSkin.chartReveal ? "chart-reveal" : ""}" style="width:100%;height:100%;display:block;">
          <path d="${chart.areaPath}" fill="${theme.areaFill}" stroke="none"></path>
          <path d="${chart.linePath}" fill="none" stroke="${theme.lineStroke}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"></path>
        </svg>
        <div style="position:absolute;top:16px;left:24px;font-size:11px;font-weight:700;letter-spacing:0.04em;color:${theme.textSecondary};text-transform:uppercase;">Perfil de l'etapa</div>
        <div style="position:absolute;bottom:16px;left:24px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:${theme.textSecondary};">${chart.min} m</div>
        <div style="position:absolute;top:16px;right:24px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:${theme.textSecondary};">${chart.max} m</div>
      </div>
    </div>
    <div class="container-narrow" style="padding:0 24px 24px 24px;">
      <div style="font-size:13px;font-weight:600;color:${theme.textSecondary};text-transform:uppercase;letter-spacing:0.04em;margin-bottom:12px;">Estadístiques de la ruta</div>
      <div class="stats-hero" style="margin-bottom:12px;">
        <div class="${(glassClass()+clayClass()).trim()}" style="background:${distTile.bg};border:${activeSkin.borderWidth} solid ${theme.border};border-radius:${activeSkin.statRadius};padding:16px;${tileShadowCss(theme)}">${statLabelHtml("distance", "Distància", distTile.fg)}<div style="font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:${distTile.fg};">${r.distanceKm} <span style="font-size:14px;font-weight:600;">km</span></div></div>
        <div class="${(glassClass()+clayClass()).trim()}" style="background:${elevTile.bg};border:${activeSkin.borderWidth} solid ${theme.border};border-radius:${activeSkin.statRadius};padding:16px;${tileShadowCss(theme)}">${statLabelHtml("elevation", "Desnivell +", elevTile.fg)}<div style="font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:${elevTile.fg};">+${r.elevGain} <span style="font-size:14px;font-weight:600;">m</span></div></div>
        <div class="${(glassClass()+clayClass()).trim()}" style="background:${durTile.bg};border:${activeSkin.borderWidth} solid ${theme.border};border-radius:${activeSkin.statRadius};padding:16px;${tileShadowCss(theme)}">${statLabelHtml("duration", "Durada estimada", durTile.fg)}<div style="font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:${durTile.fg};">${r.duration}</div></div>
        <div class="${clayClass().trim()}" style="background:${diffTile.bg};border:${activeSkin.borderWidth} solid ${theme.border};border-radius:${activeSkin.statRadius};padding:16px;${tileShadowCss(theme)}">${statLabelHtml("difficulty", "Dificultat", diffTile.fg)}<div style="font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:${diffTile.fg};">${r.difficultyLabel}</div></div>
      </div>
      <div class="${(glassClass()+clayClass()).trim()}" style="background:${theme.cardBg};border:${activeSkin.borderWidth} solid ${theme.border};border-radius:${activeSkin.statRadius};overflow:hidden;margin-bottom:16px;${tileShadowCss(theme)}">
        <div style="display:flex;justify-content:space-between;padding:13px 16px;border-bottom:1px solid ${theme.border};"><span style="font-size:13px;color:${theme.textSecondary};">Tipus de ruta</span><span style="font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:${theme.textPrimary};">${r.routeShape}</span></div>
        <div style="display:flex;justify-content:space-between;padding:13px 16px;border-bottom:1px solid ${theme.border};"><span style="font-size:13px;color:${theme.textSecondary};">Desnivell negatiu</span><span style="font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:${theme.textPrimary};">${r.elevLoss} m</span></div>
        <div style="display:flex;justify-content:space-between;padding:13px 16px;border-bottom:1px solid ${theme.border};"><span style="font-size:13px;color:${theme.textSecondary};">Altitud màxima</span><span style="font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:${theme.textPrimary};">${r.maxAlt} m</span></div>
        <div style="display:flex;justify-content:space-between;padding:13px 16px;border-bottom:1px solid ${theme.border};"><span style="font-size:13px;color:${theme.textSecondary};">Altitud mínima</span><span style="font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:${theme.textPrimary};">${r.minAlt} m</span></div>
        <div style="display:flex;justify-content:space-between;padding:13px 16px;"><span style="font-size:13px;color:${theme.textSecondary};">TrailRank</span><span style="font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:${theme.textPrimary};">${r.trailRank}</span></div>
      </div>
      <a href="${r.externalUrl}" target="_blank" rel="noopener" class="${clayClass(true).trim()}" style="text-decoration:none;background:${activeSkin.navyColor || theme.buttonBg};${activeSkin.ctaBorder ? `border:${activeSkin.borderWidth} solid ${theme.border};` : ""}${activeSkin.clay ? "" : activeSkin.glass ? `box-shadow:${theme.shadowCard};` : ""}border-radius:${activeSkin.statRadius};padding:16px;display:flex;align-items:center;justify-content:center;gap:8px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;color:${activeSkin.navyColor ? "#FFF9EC" : theme.buttonFg};margin-bottom:16px;">Veure al mapa ↗</a>
      ${sponsorsBoxHtml}
    </div>
    ${bottomBarHtml()}
  </div></div>`;
        bindActivate(document.getElementById("backBtn"), backToList);
        bindActivate(document.getElementById("themeToggle"), toggleTheme);
      }

      detectInstallability();
      loadRoutes();

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("service-worker.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
