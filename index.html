<body>
<div id="app"></div>

<script>
let trackTypes = ['MTB', 'ROAD', 'GRAVEL', 'TRAIL', 'BIKEPACKING'];

function hexToRgbArr(hex) {
  const h = hex.replace('#', '');
  return [parseInt(h.substring(0, 2), 16), parseInt(h.substring(2, 4), 16), parseInt(h.substring(4, 6), 16)];
}
function rgbStr(c, alpha) {
  return alpha === undefined ? `rgb(${c[0]},${c[1]},${c[2]})` : `rgba(${c[0]},${c[1]},${c[2]},${alpha})`;
}

// Base palette. Contrast-checked against WCAG AA (4.5:1 for normal text);
// light destructive and dark primary are darkened one step from the source
// palette (red-600→red-700, blue-500→blue-600) — the raw values were too
// light to pass as text against their paired (white) foreground.
const defaultThemeConfig = {
  light: {
    background: [255, 255, 255], foreground: [15, 23, 42],
    card: [255, 255, 255], primary: [37, 99, 235], primaryForeground: [255, 255, 255],
    muted: [241, 245, 249], mutedForeground: [100, 116, 139],
    accent: [254, 249, 195], accentForeground: [133, 77, 14],
    destructive: [220, 38, 38], destructiveForeground: [255, 255, 255], border: [226, 232, 240],
  },
  dark: {
    background: [15, 23, 42], foreground: [248, 250, 252],
    card: [30, 41, 59], primary: [37, 99, 235], primaryForeground: [255, 255, 255],
    muted: [30, 41, 59], mutedForeground: [148, 163, 184],
    accent: [30, 58, 138], accentForeground: [253, 230, 138],
    destructive: [127, 29, 29], destructiveForeground: [248, 250, 252], border: [51, 65, 85],
  },
};

let palette = { light: { ...defaultThemeConfig.light }, dark: { ...defaultThemeConfig.dark } };

function rebuildThemeObjects() {
  diffColorsByTheme = {
    light: {
      facil: { bg: rgbStr(palette.light.muted), fg: rgbStr(palette.light.foreground) },
      dificil: { bg: rgbStr(palette.light.accent), fg: rgbStr(palette.light.accentForeground) },
      moltDificil: { bg: rgbStr(palette.light.destructive), fg: rgbStr(palette.light.destructiveForeground) },
    },
    dark: {
      facil: { bg: rgbStr(palette.dark.muted), fg: rgbStr(palette.dark.mutedForeground) },
      dificil: { bg: rgbStr(palette.dark.accent), fg: rgbStr(palette.dark.accentForeground) },
      moltDificil: { bg: rgbStr(palette.dark.destructive), fg: rgbStr(palette.dark.destructiveForeground) },
    },
  };
  themes = {
    light: {
      screenBg: rgbStr(palette.light.background), cardBg: rgbStr(palette.light.card), border: rgbStr(palette.light.border),
      textPrimary: rgbStr(palette.light.foreground), textSecondary: rgbStr(palette.light.mutedForeground), textTertiary: rgbStr([110, 110, 110]),
      heroBg: rgbStr(palette.light.accent), sponsorBg: rgbStr(palette.light.muted), chipBg: rgbStr(palette.light.muted), chipBgActive: rgbStr(palette.light.primary),
      chipFgActive: rgbStr(palette.light.primaryForeground), buttonBg: rgbStr(palette.light.primary), buttonFg: rgbStr(palette.light.primaryForeground),
      typeBadgeBg: rgbStr(palette.light.primary), typeBadgeFg: rgbStr(palette.light.primaryForeground),
      areaFill: rgbStr(palette.light.primary, 0.35), lineStroke: rgbStr(palette.light.primary), linkColor: rgbStr(palette.light.accentForeground),
      shadowCard: '0 4px 12px rgba(0,0,0,0.08), 0 1px 2px rgba(0,0,0,0.08)',
    },
    dark: {
      screenBg: rgbStr(palette.dark.background), cardBg: rgbStr(palette.dark.card), border: rgbStr(palette.dark.border),
      textPrimary: rgbStr(palette.dark.foreground), textSecondary: rgbStr(palette.dark.mutedForeground), textTertiary: rgbStr(palette.dark.mutedForeground),
      heroBg: rgbStr(palette.dark.accent), sponsorBg: rgbStr(palette.dark.muted), chipBg: rgbStr(palette.dark.muted), chipBgActive: rgbStr(palette.dark.primary),
      chipFgActive: rgbStr(palette.dark.primaryForeground), buttonBg: rgbStr(palette.dark.primary), buttonFg: rgbStr(palette.dark.primaryForeground),
      typeBadgeBg: rgbStr(palette.dark.primary), typeBadgeFg: rgbStr(palette.dark.primaryForeground),
      areaFill: rgbStr(palette.dark.primary, 0.3), lineStroke: rgbStr([96, 165, 250]), linkColor: rgbStr(palette.dark.accentForeground),
      shadowCard: '0 10px 20px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.4)',
    },
  };
}
let diffColorsByTheme, themes;
rebuildThemeObjects();

function applyThemeConfig(cfg) {
  if (!cfg) return;
  if (cfg.light) palette.light = { ...palette.light, ...Object.fromEntries(Object.entries(cfg.light).map(([k, v]) => [k, hexToRgbArr(v)])) };
  if (cfg.dark) palette.dark = { ...palette.dark, ...Object.fromEntries(Object.entries(cfg.dark).map(([k, v]) => [k, hexToRgbArr(v)])) };
  rebuildThemeObjects();
}

let difficultyLabels = { facil: 'Fàcil', dificil: 'Difícil', moltDificil: 'Molt difícil' };

const socialIcons = {
  instagram: (c) => `<svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="${c}" stroke-width="1.7"><rect x="3" y="3" width="18" height="18" rx="5"></rect><circle cx="12" cy="12" r="4.2"></circle><circle cx="17.3" cy="6.7" r="1" fill="${c}" stroke="none"></circle></svg>`,
  x: (c) => `<svg viewBox="0 0 24 24" width="17" height="17" fill="${c}"><path d="M18.9 3H21l-6.6 7.5L22.2 21H16l-4.9-6.4L5.4 21H3.3l7.1-8.1L2.9 3h6.3l4.4 5.9L18.9 3Zm-1.1 16.2h1.2L7.3 4.7H6l11.8 14.5Z"></path></svg>`,
  facebook: (c) => `<svg viewBox="0 0 24 24" width="17" height="17" fill="${c}"><path d="M14 8.5h2.5V5.3c-.4-.05-1.9-.18-3.6-.18-3.6 0-6 2.2-6 6.2V15H3.4v3.6H6.9V22h4V18.6h3.4l.5-3.6H10.9v-2.3c0-1 .3-1.7 1.8-1.7H14z"></path></svg>`,
  strava: (c) => `<svg viewBox="0 0 24 24" width="17" height="17" fill="${c}"><path d="M10.5 2 5 13.5h3.3L10.5 9l2.2 4.5h3.3L10.5 2Zm3.4 13.4-1.7 3.4-1.7-3.4H7.3l3.2 6.6h3.9l3.2-6.6h-3.7Z"></path></svg>`,
  youtube: (c) => `<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="${c}" stroke-width="1.7"><rect x="2.5" y="5.5" width="19" height="13" rx="3.5"></rect><path d="M10.5 9.5 15 12l-4.5 2.5Z" fill="${c}" stroke="none"></path></svg>`,
  web: (c) => `<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="${c}" stroke-width="1.7"><circle cx="12" cy="12" r="9"></circle><path d="M3 12h18M12 3c2.5 2.7 2.5 15.3 0 18M12 3c-2.5 2.7-2.5 15.3 0 18"></path></svg>`,
};

let state = { screen: 'home', selected: null, routes: [], status: 'loading', themeName: 'light', filterType: 'ALL', filterDifficulty: 'ALL', filterDistance: 'ALL', filterElevation: 'ALL', searchText: '', moreFiltersOpen: false, config: null, showInstallBanner: false };

let deferredInstallPrompt = null;
let installPlatform = null;

function isStandalonePwa() {
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
}
function detectInstallability() {
  if (isStandalonePwa()) return;
  if (localStorage.getItem('pwaInstallDismissed') === '1') return;
  const ua = navigator.userAgent;
  const isIOS = /iPhone|iPad|iPod/.test(ua) && !window.MSStream;
  if (isIOS) {
    installPlatform = 'ios';
    state.showInstallBanner = true;
  }
}
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  if (isStandalonePwa() || localStorage.getItem('pwaInstallDismissed') === '1') return;
  installPlatform = 'android';
  state.showInstallBanner = true;
  if (state.status === 'ready') render();
});
window.addEventListener('appinstalled', () => {
  deferredInstallPrompt = null;
  state.showInstallBanner = false;
  if (state.status === 'ready') render();
});
async function installPwa() {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  await deferredInstallPrompt.userChoice;
  deferredInstallPrompt = null;
  state.showInstallBanner = false;
  render();
}
function dismissInstallBanner() {
  state.showInstallBanner = false;
  localStorage.setItem('pwaInstallDismissed', '1');
  render();
}

function hashForState() {
  if (state.screen === 'detail' && state.selected != null) return '#ruta-' + state.selected;
  if (state.screen === 'list') return '#rutes';
  return '#';
}
function pushHistory() {
  const hash = hashForState();
  if (location.hash !== hash) history.pushState({ screen: state.screen, selected: state.selected }, '', hash);
}
function applyStateFromHash() {
  const hash = location.hash;
  if (hash.startsWith('#ruta-')) {
    const id = parseInt(hash.slice(6), 10);
    if (state.routes.some(r => r.id === id)) {
      state.screen = 'detail';
      state.selected = id;
      return;
    }
  }
  if (hash === '#rutes') { state.screen = 'list'; return; }
  state.screen = 'home';
}
window.addEventListener('popstate', () => {
  if (state.status !== 'ready') return;
  applyStateFromHash();
  render();
});

let distanceBuckets = [
  { key: 'ALL', label: 'Tots' },
  { key: 'lt10', label: '< 10 km', max: 10 },
  { key: '10-30', label: '10-30 km', min: 10, max: 30 },
  { key: 'gt30', label: '> 30 km', min: 30 },
];
let elevationBuckets = [
  { key: 'ALL', label: 'Tots' },
  { key: 'lt200', label: '< 200 m', max: 200 },
  { key: '200-500', label: '200-500 m', min: 200, max: 500 },
  { key: 'gt500', label: '> 500 m', min: 500 },
];
function bucketMatches(bucket, value) {
  if (bucket.min !== undefined && value < bucket.min) return false;
  if (bucket.max !== undefined && value > bucket.max) return false;
  return true;
}
function applyFiltersConfig(filters) {
  if (!filters) return;
  if (filters.trackTypes) trackTypes = filters.trackTypes;
  if (filters.difficultyLabels) difficultyLabels = { ...difficultyLabels, ...filters.difficultyLabels };
  if (filters.distanceBuckets) distanceBuckets = [{ key: 'ALL', label: 'Tots' }, ...filters.distanceBuckets];
  if (filters.elevationBuckets) elevationBuckets = [{ key: 'ALL', label: 'Tots' }, ...filters.elevationBuckets];
}

function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function parseGpx(xmlText, id, trackType) {
  const doc = new DOMParser().parseFromString(xmlText, 'text/xml');
  let pointEls = Array.from(doc.getElementsByTagName('trkpt'));
  let container = doc.getElementsByTagName('trk')[0];
  if (!pointEls.length) {
    pointEls = Array.from(doc.getElementsByTagName('rtept'));
    container = doc.getElementsByTagName('rte')[0];
  }
  if (!pointEls.length) {
    pointEls = Array.from(doc.getElementsByTagName('wpt'));
    container = null;
  }
  if (!pointEls.length) return null;

  const points = pointEls.map(pt => ({
    lat: parseFloat(pt.getAttribute('lat')),
    lon: parseFloat(pt.getAttribute('lon')),
    ele: parseFloat((pt.getElementsByTagName('ele')[0] && pt.getElementsByTagName('ele')[0].textContent) || '0'),
  }));

  let distanceKm = 0, elevGain = 0, elevLoss = 0;
  for (let i = 1; i < points.length; i++) {
    distanceKm += haversineKm(points[i - 1].lat, points[i - 1].lon, points[i].lat, points[i].lon);
    const diff = points[i].ele - points[i - 1].ele;
    if (diff > 0) elevGain += diff; else elevLoss += -diff;
  }
  elevGain = Math.round(elevGain);
  elevLoss = Math.round(elevLoss);
  distanceKm = Math.round(distanceKm * 10) / 10;
  const maxAlt = Math.round(Math.max(...points.map(p => p.ele)));
  const minAlt = Math.round(Math.min(...points.map(p => p.ele)));

  const gainPerKm = elevGain / (distanceKm || 1);
  const diffKey = gainPerKm > 20 ? 'moltDificil' : gainPerKm > 10 ? 'dificil' : 'facil';

  const speed = 22 - Math.min(gainPerKm * 0.5, 10);
  const hoursFloat = distanceKm / Math.max(speed, 8);
  const hours = Math.floor(hoursFloat);
  const minutes = Math.round((hoursFloat - hours) * 60);
  const duration = hours > 0 ? `${hours}h ${minutes}m` : `${minutes}m`;

  const nameEl = (container && container.getElementsByTagName('name')[0]) || doc.getElementsByTagName('name')[0];
  const rawName = (nameEl ? nameEl.textContent : 'Ruta sense nom').trim();
  const parts = rawName.includes(',') ? rawName.split(/,\s*/, 2) : [rawName, ''];

  const closeKm = haversineKm(points[0].lat, points[0].lon, points[points.length - 1].lat, points[points.length - 1].lon);
  const routeShape = closeKm < Math.max(distanceKm * 0.05, 0.3) ? 'Circular' : 'Lineal';
  const trailRank = Math.max(1, Math.min(99, Math.round(distanceKm * 0.9 + elevGain * 0.045)));

  const lats = points.map(p => p.lat), lons = points.map(p => p.lon);
  const centerLat = ((Math.min(...lats) + Math.max(...lats)) / 2).toFixed(5);
  const centerLon = ((Math.min(...lons) + Math.max(...lons)) / 2).toFixed(5);
  const externalUrl = `https://www.openstreetmap.org/#map=12/${centerLat}/${centerLon}`;

  return {
    id, name: parts[0], location: parts[1],
    distanceKm, elevGain, elevLoss, duration, maxAlt, minAlt, diffKey, trailRank, routeShape, trackType, externalUrl,
    profile: points.map(p => Math.round(p.ele)),
    shapePoints: routeShapeSvg(points),
  };
}

function routeShapeSvg(points) {
  const lats = points.map(p => p.lat);
  const lons = points.map(p => p.lon);
  const minLat = Math.min(...lats), maxLat = Math.max(...lats);
  const minLon = Math.min(...lons), maxLon = Math.max(...lons);
  const latRange = (maxLat - minLat) || 1, lonRange = (maxLon - minLon) || 1;
  const w = 300, h = 130, pad = 14;
  return points.map(p => {
    const x = pad + ((p.lon - minLon) / lonRange) * (w - 2 * pad);
    const y = pad + (1 - (p.lat - minLat) / latRange) * (h - 2 * pad);
    return x.toFixed(1) + ',' + y.toFixed(1);
  }).join(' ');
}

function chartData(profile) {
  const min = Math.min(...profile);
  const max = Math.max(...profile);
  const w = 300, h = 130, topPad = 40, bottomPad = 10;
  const n = profile.length;
  const pts = profile.map((v, i) => {
    const x = (i / (n - 1)) * w;
    const y = h - bottomPad - ((v - min) / ((max - min) || 1)) * (h - topPad - bottomPad);
    return [x, y];
  });
  const points = pts.map(p => p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
  let d = 'M ' + pts[0][0].toFixed(1) + ' ' + h + ' ';
  pts.forEach(p => { d += 'L ' + p[0].toFixed(1) + ' ' + p[1].toFixed(1) + ' '; });
  d += 'L ' + pts[pts.length - 1][0].toFixed(1) + ' ' + h + ' Z';
  return { points, areaPath: d, min, max };
}

async function loadConfig() {
  try {
    const res = await fetch('rutas/config.json');
    if (!res.ok) return null;
    return await res.json();
  } catch (e) {
    return null;
  }
}

async function loadTheme() {
  try {
    const res = await fetch('rutas/theme.json');
    if (!res.ok) return;
    const cfg = await res.json();
    applyThemeConfig(cfg);
  } catch (e) { /* keep defaults */ }
}

async function loadRoutes() {
  state.config = await loadConfig();
  await loadTheme();
  if (state.config && state.config.filters) applyFiltersConfig(state.config.filters);
  try {
    const manifestRes = await fetch('rutas/manifest.json');
    if (!manifestRes.ok) throw new Error('no manifest');
    const entries = await manifestRes.json();
    if (!entries || !entries.length) { state.status = 'empty'; render(); return; }
    const routes = [];
    const difficultyOverrides = (state.config && state.config.difficultyOverrides) || {};
    const durationOverrides = (state.config && state.config.durationOverrides) || {};
    for (let i = 0; i < entries.length; i++) {
      const entry = entries[i];
      const filename = typeof entry === 'string' ? entry : entry.file;
      const trackType = typeof entry === 'string' ? 'MTB' : (entry.type || 'MTB');
      const res = await fetch('rutas/' + filename);
      const text = await res.text();
      const route = parseGpx(text, i + 1, trackType);
      if (route) {
        if (difficultyOverrides[filename]) route.diffKey = difficultyOverrides[filename];
        if (durationOverrides[filename]) route.duration = durationOverrides[filename];
        routes.push(route);
      }
    }
    if (!routes.length) { state.status = 'empty'; render(); return; }
    const typesFound = [...new Set(routes.map(r => r.trackType))];
    const preferredTypes = (state.config && state.config.filters && state.config.filters.trackTypes) || [];
    trackTypes = [
      ...preferredTypes.filter(t => typesFound.includes(t)),
      ...typesFound.filter(t => !preferredTypes.includes(t)).sort(),
    ];
    state.routes = routes;
    state.status = 'ready';
    state.selected = routes[0].id;
    applyStateFromHash();
    render();
  } catch (e) {
    state.status = 'error';
    render();
  }
}

function openRoute(id) { state.selected = id; state.screen = 'detail'; pushHistory(); render(); }
function showList() { state.screen = 'list'; pushHistory(); render(); }
function backToList() { state.screen = 'list'; pushHistory(); render(); }
function backToHome() { state.screen = 'home'; pushHistory(); render(); }
function toggleTheme() { state.themeName = state.themeName === 'light' ? 'dark' : 'light'; render(); }
function setFilter(type) { state.filterType = type; render(); }
function setDifficultyFilter(key) { state.filterDifficulty = key; render(); }
function setDistanceFilter(key) { state.filterDistance = key; render(); }
function setElevationFilter(key) { state.filterElevation = key; render(); }
function toggleMoreFilters() { state.moreFiltersOpen = !state.moreFiltersOpen; render(); }
function clearMoreFilters() { state.filterDifficulty = 'ALL'; state.filterDistance = 'ALL'; state.filterElevation = 'ALL'; render(); }
function setSearchText(value) { state.searchText = value; render(); }

function decorate(route) {
  const c = diffColorsByTheme[state.themeName][route.diffKey];
  return { ...route, difficultyLabel: difficultyLabels[route.diffKey], difficultyBg: c.bg, difficultyFg: c.fg };
}

function render() {
  const app = document.getElementById('app');
  const theme = themes[state.themeName];
  document.body.style.background = state.themeName === 'dark' ? 'rgb(10,10,10)' : 'rgb(245,245,245)';
  const searchWasFocused = document.activeElement && document.activeElement.id === 'searchInput';
  const searchCaret = searchWasFocused ? document.activeElement.selectionStart : null;

  if (state.status === 'loading') {
    app.innerHTML = `<div class="screen" style="background:${theme.screenBg}"><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;">
      <div style="width:36px;height:36px;border-radius:50%;border:3px solid ${theme.border};border-top-color:${theme.lineStroke};animation:spin 0.8s linear infinite;"></div>
      <div style="font-size:13px;color:${theme.textSecondary};">Llegint fitxers de rutes…</div>
    </div></div>`;
    return;
  }
  if (state.status === 'empty' || state.status === 'error') {
    const msg = state.status === 'empty'
      ? `<div style="font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:600;color:${theme.textPrimary};margin-bottom:8px;">Sense rutes</div>
         <div style="font-size:13px;color:${theme.textSecondary};">Afegeix fitxers .gpx a la carpeta <b>rutas/</b> i declara'ls a <b>manifest.json</b>.</div>`

        <div style="background:${theme.cardBg};border:1px solid ${theme.border};border-radius:16px;padding:16px;box-shadow:${theme.shadowCard};"><div style="font-size:12px;color:${theme.textSecondary};margin-bottom:6px;">Desnivell positiu</div><div style="font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:${theme.lineStroke};">+${r.elevGain} <span style="font-size:14px;font-weight:600;">m</span></div></div>
        <div style="background:${theme.cardBg};border:1px solid ${theme.border};border-radius:16px;padding:16px;box-shadow:${theme.shadowCard};"><div style="font-size:12px;color:${theme.textSecondary};margin-bottom:6px;">Durada estimada</div><div style="font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:${theme.textPrimary};">${r.duration}</div></div>
        <div style="background:${r.difficultyBg};border:1px solid ${theme.border};border-radius:16px;padding:16px;box-shadow:${theme.shadowCard};"><div style="font-size:12px;color:${r.difficultyFg};opacity:0.75;margin-bottom:6px;">Dificultat</div><div style="font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:${r.difficultyFg};">${r.difficultyLabel}</div></div>
      </div>
      <div style="background:${theme.cardBg};border:1px solid ${theme.border};border-radius:16px;overflow:hidden;margin-bottom:16px;box-shadow:${theme.shadowCard};">
        <div style="display:flex;justify-content:space-between;padding:13px 16px;border-bottom:1px solid ${theme.border};"><span style="font-size:13px;color:${theme.textSecondary};">Tipus de ruta</span><span style="font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:${theme.textPrimary};">${r.routeShape}</span></div>
        <div style="display:flex;justify-content:space-between;padding:13px 16px;border-bottom:1px solid ${theme.border};"><span style="font-size:13px;color:${theme.textSecondary};">Desnivell negatiu</span><span style="font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:${theme.textPrimary};">${r.elevLoss} m</span></div>
        <div style="display:flex;justify-content:space-between;padding:13px 16px;border-bottom:1px solid ${theme.border};"><span style="font-size:13px;color:${theme.textSecondary};">Altitud màxima</span><span style="font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:${theme.textPrimary};">${r.maxAlt} m</span></div>
        <div style="display:flex;justify-content:space-between;padding:13px 16px;border-bottom:1px solid ${theme.border};"><span style="font-size:13px;color:${theme.textSecondary};">Altitud mínima</span><span style="font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:${theme.textPrimary};">${r.minAlt} m</span></div>
        <div style="display:flex;justify-content:space-between;padding:13px 16px;"><span style="font-size:13px;color:${theme.textSecondary};">TrailRank</span><span style="font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:${theme.textPrimary};">${r.trailRank}</span></div>
      </div>
      <a href="${r.externalUrl}" target="_blank" rel="noopener" style="text-decoration:none;background:${theme.buttonBg};border-radius:16px;padding:16px;display:flex;align-items:center;justify-content:center;gap:8px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;color:${theme.buttonFg};margin-bottom:16px;">Veure al mapa ↗</a>
      ${sponsorsBoxHtml}
      ${footerHtml}
    </div>
  </div></div>`;
  document.getElementById('backBtn').addEventListener('click', backToList);
  document.getElementById('themeToggle').addEventListener('click', toggleTheme);
}

detectInstallability();
loadRoutes();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  });
}

</script>
</body>
</html>
